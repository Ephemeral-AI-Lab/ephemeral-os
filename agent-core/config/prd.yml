# agent-core/config/prd.yml — committed baseline configuration (no secrets).
#
# Loaded first by `eos_config::load()`. A gitignored `agent-core/config/local.yml`
# is merged over it (objects recurse, scalars/arrays replace) for secrets and
# per-deployment overrides. There is no environment-variable or CLI selection:
# config is chosen by file.

database:
  url: "sqlite:///./.ephemeralos/ephemeralos.db"
  pool_size: 5
  busy_timeout_ms: 5000
  wal: true
  foreign_keys: true

providers:
  retry:
    max_retries: 3
    base_delay_s: 1.0
    max_delay_s: 30.0
    status_codes: [429, 500, 502, 503, 529]

attempt:
  max_concurrent_task_runs: 8
