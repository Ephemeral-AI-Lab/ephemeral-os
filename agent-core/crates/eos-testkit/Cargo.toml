[package]
name = "eos-testkit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Shared agent-core test doubles: scripted LLM/EventSource, fake sandbox transport/provisioner, the AppState test builder, and the Layer-B workflow runner/store doubles. Dev-dependency only."

[dependencies]
async-trait = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
eos-types = { workspace = true }
# `llm` (Layer A): scripted EventSource doubles, fake transport, AppState agent
# builders, and the `run_until` stream stepper.
eos-agent-def = { workspace = true, optional = true }
eos-engine = { workspace = true, optional = true }
eos-llm-client = { workspace = true, optional = true }
eos-sandbox-api = { workspace = true, optional = true }
# `mock-state`: a real AppState over the fake provisioner/transport + temp SQLite.
# `.provisioner(...)` is plain `pub` (no `test-util` gate), so no feature is
# required on `eos-runtime`.
eos-runtime = { workspace = true, optional = true }
anyhow = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }
# `workflow` (Layer B): in-memory stores + AgentRunner doubles + wait_until.
eos-workflow = { workspace = true, optional = true }
eos-state = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }

[features]
default = ["llm", "mock-state"]
# Layer A doubles (public-API only); pulls only the engine path.
llm = ["dep:eos-agent-def", "dep:eos-engine", "dep:eos-llm-client", "dep:eos-sandbox-api"]
# build_test_state + FakeProvisioner; pulls eos-runtime (implies `llm`).
mock-state = ["llm", "dep:eos-runtime", "dep:anyhow", "dep:tempfile"]
# Layer B workflow runner/store doubles + wait_until; independent of `llm`.
workflow = ["dep:eos-workflow", "dep:eos-state", "dep:parking_lot"]

[lints]
workspace = true
