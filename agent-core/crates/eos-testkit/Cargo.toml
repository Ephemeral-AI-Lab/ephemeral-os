[package]
name = "eos-testkit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Shared agent-core test doubles: scripted LLM/EventSource, fake sandbox transport/provisioner, and the AppState test builder. Dev-dependency only."

[dependencies]
async-trait = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
eos-types = { workspace = true }
eos-agent-def = { workspace = true }
eos-engine = { workspace = true }
eos-llm-client = { workspace = true }
eos-sandbox-api = { workspace = true }
# `mock-state` only: build a real AppState over fake provisioner/transport. Needs
# the runtime's `test-util` feature to reach the `RequestProvisioner` seam.
eos-runtime = { workspace = true, features = ["test-util"], optional = true }
anyhow = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }

[features]
default = ["llm", "mock-state"]
# Scripted LLM/EventSource doubles + factories + tool_use_turn (public-API only).
llm = []
# FakeProvisioner + build_test_state (pulls eos-runtime/test-util).
mock-state = ["dep:eos-runtime", "dep:anyhow", "dep:tempfile"]

[lints]
workspace = true
