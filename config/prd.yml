version: 1

gateway:
  default_image_profile:
    image: sweevo-dask__dask-10042:latest
    platform: linux/amd64

daemon:
  server:
    socket_path: /eos/runtime/daemon/runtime.sock
    pid_path: /eos/runtime/daemon/runtime.pid
    max_worker_threads: 4

  inflight:
    ttl_s: 300
    reaper_interval_s: 30

  commands:
    scratch_root: /eos/scratch/commands
    default_yield_time_ms: 1000
    default_timeout_s: 600
    quiet_ms: 50
    cancel_wait_ms: 500
    output_drain_grace_ms: 500
    max_command_s: 21600
    transcript_timestamp_timezone: UTC
    ignored_capture:
      # Bounded ignored-lane command capture. Large accepted ignored payloads
      # above the spool threshold are copied through command-owned spool files.
      max_files: 4096
      max_bytes: 67108864
      max_file_bytes: 16777216
      spool_threshold_bytes: 1048576
      max_metadata_capture_duration_ms: 30000
  idle_workspace_eviction:
    interval_ms: 500

  layer_stack:
    auto_squash_max_depth: 100

isolated:
  enabled: false
  scratch_root: /eos/scratch/isolated
  ttl_s: 1800
  total_cap: 5
  upperdir_bytes: 1073741824
  memavail_fraction: 0.5
  setup_timeout_s: 30
  exit_grace_s: 0.25
  rfc1918_egress: allow
  fallback_dns: 1.1.1.1
  workspace_root: /testbed
  sample_interval_s: 0.5

runner:
  child_wait_poll_ms: 5
  mount_mask:
    hidden_paths:
      - /eos
      - /sys/fs/cgroup
  env:
    inherit_keys: [PATH, HOME, USER, LANG, LC_ALL, TERM, TZ]
    restricted_keys:
      - LD_PRELOAD
      - LD_LIBRARY_PATH
      - LD_AUDIT
      - DYLD_INSERT_LIBRARIES
      - DYLD_LIBRARY_PATH
      - PATH
      - PYTHONPATH
      - BASH_ENV
      - ENV
    default_path: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    testbed_path_prefix:
      - /opt/miniconda3/envs/testbed/bin
      - /opt/miniconda3/bin
