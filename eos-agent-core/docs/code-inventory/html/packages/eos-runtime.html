<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>@eos/runtime Code Inventory</title>
  <link rel="stylesheet" href="../assets/inventory.css">
  <script defer src="../assets/inventory-data.js"></script>
  <script defer src="../assets/inventory.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">eos-agent-core</a>
    <nav>
      <a href="../assets/inventory.json">JSON</a>
      <a href="../assets/graph.json">Graph</a>
    </nav>
  </header>
  <main>

      <section class="page-head">
        <div>
          <p class="eyebrow"><a href="../index.html">Code Inventory</a></p>
          <h1>@eos/runtime</h1>
          <p class="lede">packages/runtime</p>
          <div class="tags"><span>empty-package</span><span>runtime</span></div>
        </div>
        <dl class="stat-grid">
          <div><dt>Modules</dt><dd>0</dd></div>
          <div><dt>Source</dt><dd>0</dd></div>
          <div><dt>Tests</dt><dd>0</dd></div>
          <div><dt>Symbols</dt><dd>0</dd></div>
        </dl>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Package Manifest</h2>
          <span>module</span>
        </div>
        <div class="manifest-grid">
          <div><strong>exports</strong><p>none</p></div>
          <div><strong>dependencies</strong><p>none</p></div>
          <div><strong>devDependencies</strong><p>none</p></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>File Tree</h2>
          <input class="search-input" type="search" placeholder="Filter files, symbols, tags" aria-label="Filter files, symbols, tags">
        </div>
        <div class="tree-empty">No TypeScript source files found.</div>
      </section>

      <section class="panel">
        <div class="panel-head"><h2>Relations</h2><span>0</span></div>
        <div class="table-wrap relation-table">
          <table>
            <thead><tr><th>Kind</th><th>From</th><th>To</th><th>Line</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

  </main>
</body>
</html>
