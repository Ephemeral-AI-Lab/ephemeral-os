database:
  url: "sqlite:///./.ephemeralos/ephemeralos.db" # process env override: EPHEMERALOS_DATABASE_URL
  pool_size: 5
  max_overflow: 10
  pool_pre_ping: true
  echo: false

sandbox:
  default_provider: docker
  timeout_s: 300
  runtime_client_timeout_s: 600
  docker:
    daemon_tcp: true
    privileged: false
    no_privilege: false
    default_snapshot: ""
  daytona:
    api_key: "" # env: DAYTONA_API_KEY
    api_url: "" # env: DAYTONA_API_URL
    target: "" # env: DAYTONA_TARGET
    tcp_host: ""
    tcp_port: null
    default_image: "" # env: EPHEMERALOS_SANDBOX_DEFAULT_IMAGE
    default_snapshot: ""

providers:
  retry:
    max_retries: 3
    base_delay_s: 1
    max_delay_s: 60
    status_codes:
      - 429
      - 500
      - 502
      - 503
      - 504
  minimax:
    base_url: ""
    model: ""

runner:
  audit_dir: .sweevo_runs
  run_label: test_runner
  sandbox_reuse_mode: reuse
  sandbox_quota: 3
  live_e2e:
    heavy_enabled: true
    capacity_enabled: true
    real_agent_max_duration_s: 1800
