version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: ephemeralos-postgres
    environment:
      POSTGRES_USER: ephemeralos
      POSTGRES_PASSWORD: ephemeralos
      POSTGRES_DB: ephemeralos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ephemeralos"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
