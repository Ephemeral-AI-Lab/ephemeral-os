[package]
name = "eos-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "The single sandbox entry point: receive, gate, route, return."

[lib]
name = "eos_api"
path = "src/lib.rs"

[[bin]]
name = "eos-api"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
eos-sandbox-host = { workspace = true }
# preserve_order keeps forwarded request args in caller order on the wire.
serde_json = { workspace = true, features = ["preserve_order"] }

[lints]
workspace = true
