[package]
name = "eos-e2e-test"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Protocol-only sandbox correctness/pressure suite: drives a live eosd over eos-protocol."

[dependencies]
# The ONLY operation interface: raw eos-protocol envelopes against a live eosd.
eos-protocol = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# Test-edge orchestration error type (binary/test boundary, per Rust guidance).
anyhow = { workspace = true }
# Committed topology config file (e2e.toml).
toml = { workspace = true }

[features]
# When enabled, a missing docker/eosd environment is a HARD failure instead of a
# graceful skip. CI runs `--features e2e` on Linux to enforce real execution;
# dev hosts run plain `cargo test` and skip the docker tiers cleanly.
e2e = []

[lints]
workspace = true
