[package]
name = "eos-plugin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
eos-protocol.workspace = true
# Errors + small JSON arg objects only. NOT eos-occ — the no-publish/no-second-writer
# guard (06-crate-map §A) keeps that internal edge absent; PPC payload bodies stay
# opaque `String`, reusing eos_protocol's envelope encode/decode for framing.
serde.workspace = true
thiserror.workspace = true
serde_json.workspace = true
# `host` package publish/setup: content-hash markers + staged-upload ids.
sha2.workspace = true
uuid.workspace = true

[features]
# Test-only seam: lets a caller redirect the managed package roots to temp dirs.
# Production builds MUST leave this off so the roots stay the fixed `/eos/...`
# managed paths and an untrusted plugin caller cannot redirect package publishing.
# The daemon enables it from its `[dev-dependencies]` so only its test build sees it.
test-root-override = []

[lints]
workspace = true
