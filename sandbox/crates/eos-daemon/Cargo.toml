[package]
name = "eos-daemon"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
eos-config.workspace = true
eos-protocol.workspace = true
eos-layerstack.workspace = true
eos-overlay.workspace = true
eos-occ.workspace = true
eos-occ-layerstack.workspace = true
eos-workspace.workspace = true
eos-workspace-modes.workspace = true
eos-plugin.workspace = true
eos-checkpoint.workspace = true
eos-workspace-run.workspace = true
eos-runner.workspace = true
eos-command-session.workspace = true
serde_json.workspace = true
serde.workspace = true
sha2.workspace = true
tokio.workspace = true
tokio-util.workspace = true
thiserror.workspace = true
uuid.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
nix = { workspace = true, features = ["fs", "process", "signal"] }

[dev-dependencies]
# Enable the package-root test seam only for the daemon's own test build; the
# production `[dependencies]` entry above leaves it off (resolver 2 keeps the
# dev-dependency feature out of the non-test build).
eos-plugin = { workspace = true, features = ["test-root-override"] }

[lints]
workspace = true
