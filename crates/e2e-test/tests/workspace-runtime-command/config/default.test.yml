isolated:
  enabled: true
  upperdir_bytes: 67108864
  memavail_fraction: 0.9

daemon:
  commands:
    default_timeout_s: 1
    ignored_capture:
      max_files: 4096
      max_bytes: 32768
      max_file_bytes: 8192
      spool_threshold_bytes: 1024
      max_metadata_capture_duration_ms: 30000
e2e_test:
  pool:
    sandboxes: 4
  workload:
    concurrency_levels: [1, 3, 6, 12]
    write_iterations: 8
    sample_count: 3
    perf_artifact_dir: target/e2e-perf
    timeout_s: 30
