syntax = "proto3";

package eos.trace.v1;

message RequestStart {
  string trace_id = 1;
  string request_id = 2;
  string sandbox_id = 3;
  string op = 4;
  bool mutates_state = 5;
  string args_summary_json = 6;
  bool args_summary_truncated = 7;
  string args_summary_sha256 = 8;
  uint64 args_summary_original_len = 9;
  uint64 started_at_unix_ms = 10;
  string caller_id = 11;
  string host_boot_id = 12;
  uint64 args_len = 13;
  string args_digest = 14;
}

message ResponsePersisted {
  string trace_id = 1;
  string request_id = 2;
  string status = 3;
  string error_kind = 4;
  uint64 received_at_unix_ms = 5;
  uint64 host_rtt_ms = 6;
  string response_digest = 7;
  uint64 response_len = 8;
  string response_summary_json = 9;
}

message AuditEntry {
  string entry_id = 1;
  string trace_id = 2;
  uint64 seq = 3;
  bytes payload = 4;
  bytes previous_hash = 5;
  bytes entry_hash = 6;
  string schema_version = 7;
  uint64 written_at_unix_ms = 8;
}
