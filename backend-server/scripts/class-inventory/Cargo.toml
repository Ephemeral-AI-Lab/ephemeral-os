[package]
name = "backend-server-class-inventory"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"

[workspace]

[dependencies]
anyhow = "1"
html-escape = "0.2"
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syn = { version = "2", features = ["full", "visit"] }
walkdir = "2"
