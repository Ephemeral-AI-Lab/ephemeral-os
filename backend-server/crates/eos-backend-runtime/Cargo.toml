[package]
name = "eos-backend-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[dependencies]
# Sandbox port contracts the manager implements / hands back (the injected
# gateway, the daemon transport, and the request provisioner binding).
eos-sandbox-port.workspace = true
# Concrete Docker/daemon host the production manager composes: one registry ->
# daemon client (transport) -> lifecycle -> request provisioner.
eos-sandbox-host.workspace = true
# Backend-owned DTOs (sanitized SandboxView / SandboxState, RunMeta, EventRecord)
# and lifecycle config.
eos-backend-types.workspace = true
eos-backend-config.workspace = true
# backend.db persistence: run_meta + event_log repositories the launcher, reaper,
# and event bus write through (never a raw pool).
eos-backend-store.workspace = true
# agent-core composition entry the launcher drives to completion, plus the owner
# crates for the host seam / status resolver values.
eos-agent-core.workspace = true
eos-workflow.workspace = true
# Typed ids and timestamps used by the refcount state, bindings, and run lifecycle.
eos-types.workspace = true

async-trait.workspace = true
parking_lot.workspace = true
thiserror.workspace = true
tracing.workspace = true
# tokio drives the spawned run task and the event-bus channels (mpsc/broadcast);
# tokio-util's CancellationToken is the cooperative cancel signal.
tokio.workspace = true
tokio-util.workspace = true
# the event-bus callback classifies StreamEvents and builds owned EventRecord
# payloads (serde_json::to_value); also serializes the client_meta blob.
serde_json.workspace = true

[dev-dependencies]
# temp backend.db files for launcher/reaper/event-bus persistence tests.
tempfile.workspace = true

[package.metadata.cargo-machete]
ignored = ["tempfile"]

[lints]
workspace = true
