# backend-server deployment config (ServerConfig). Committed baseline; a
# gitignored backend-server/config/local.yml is merged over it.
#
# This file owns ONLY backend deployment + sandbox lifecycle defaults. Provider
# and workflow config live in agent-core's config; daemon/runtime config lives
# in sandbox's config (AC11).

bind: "0.0.0.0:8080"
backend_db_path: "./.ephemeralos/backend.db"

agent_core:
  # Deterministic agent-core config directory (holds prd.yml < local.yml).
  config_dir: "../agent-core/config"
  # Deployable agent-core database url the backend supplies.
  database_url: "sqlite:///./.ephemeralos/ephemeralos.db"
  # Root for agent-core-owned agent-node messages/events artifacts.
  artifact_root: "./.ephemeralos/agent-artifacts"

sandbox:
  default_snapshot: null
  max_owned_sandboxes: 16
  destroy_on_finish: true
  startup_timeout_ms: 30000

obs:
  event_queue_capacity: 1024
  audit_queue_capacity: 1024
  # v1 first milestone excludes sandbox-internal audit from /api/stats/events.
  include_sandbox_audit: false
